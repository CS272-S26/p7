<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Athlete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
    <style>
        .athlete-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: blur(20px);
            transition: filter 0.5s ease;
        }
        .revealed {
            filter: blur(0) !important;
        }
        .card {
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .clues-list {
            min-height: 80px;q
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
<header></header>
<div class="container">
    <h1 class="text-center mb-5">Legendary Athletes: Guess Who?</h1>
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card" id="athlete-1">
                <img src="" class="card-img-top athlete-img" alt="Athlete 1">
                <div class="card-body">
                    <h5 class="card-title">Athlete #1</h5>
                    <ul class="clues-list">
                        <li>I won 6 NBA championships.</li>
                        <li>I played for the Chicago Bulls.</li>
                    </ul>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control athlete-guess" placeholder="Enter name..." data-answer="michael jordan">
                        <button class="btn btn-primary submit-btn" type="button">Guess</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card" id="athlete-2">
                <img src="" class="card-img-top athlete-img" alt="Athlete 2">
                <div class="card-body">
                    <h5 class="card-title">Athlete #2</h5>
                    <ul class="clues-list">
                        <li>I have 23 Grand Slam singles titles.</li>
                        <li>I have won 4 Olympic gold medals.</li>
                    </ul>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control athlete-guess" placeholder="Enter name..." data-answer="serena williams">
                        <button class="btn btn-primary submit-btn" type="button">Guess</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card" id="athlete-3">
                <img src="" class="card-img-top athlete-img" alt="Athlete 3">
                <div class="card-body">
                    <h5 class="card-title">Athlete #3</h5>
                    <ul class="clues-list">
                        <li>I led Argentina to a World Cup victory in 2022.</li>
                        <li>I have won 8 Ballon d'Or awards.</li>
                    </ul>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control athlete-guess" placeholder="Enter name..." data-answer="lionel messi">
                        <button class="btn btn-primary submit-btn" type="button">Guess</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script-athlete.js"></script>
<script src="base.js"></script>
</body>
</html>

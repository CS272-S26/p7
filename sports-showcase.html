<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sports & Athlete Showcase</title>
    <!-- Include Bootstrap for consistency with other pages -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <!-- base.js will inject the standard navigation here -->
    <header></header>

    <main class="container">
        <!-- The Sports Grid Section -->
        <section id="sports-grid-container" class="showcase-section">
            <h2>Explore Sports</h2>
            <div id="sports-grid" class="horizontal-scroll">
                <!-- Sports cards will be injected here -->
                <p class="status-msg">Loading sports...</p>
            </div>
        </section>

        <!-- The Athlete Hologram Card Section -->
        <section id="athlete-hologram-container" class="showcase-section">
            <h2>Athlete Search</h2>
            <div class="search-controls">
                <input type="text" id="player-search-input" placeholder="Enter athlete name (e.g. Danny Welbeck)">
                <button id="player-search-btn">Search Athlete</button>
            </div>
            <div id="athlete-display">
                <!-- Hologram card will be injected here -->
            </div>
        </section>

        <!-- The Global League Banner Section -->
        <section id="league-banner-container" class="showcase-section">
            <h2>Featured League</h2>
            <div id="league-display">
                <!-- League content will be injected here -->
                <p class="status-msg">Loading featured league...</p>
            </div>
            <div class="multilingual-controls">
                <label for="lang-select">Description Language:</label>
                <select id="lang-select">
                    <option value="EN">English</option>
                    <option value="ES">Spanish</option>
                    <option value="FR">French</option>
                    <option value="DE">German</option>
                    <option value="IT">Italian</option>
                    <option value="JP">Japanese</option>
                    <option value="RU">Russian</option>
                </select>
            </div>
        </section>
    </main>

    <!-- base.js will inject the standard footer here -->
    <footer></footer>

    <!-- Bootstrap and Base JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="base.js"></script>
    <!-- Page specific JS -->
    <script src="script-showcase.js"></script>
</body>
</html>
